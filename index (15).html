<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>博客搭建大成功！</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --muted:#7b7f87;
      --accent:#6366f1; /* 柔和主色 */
      --max-width:900px;
      --radius:16px;
      --shadow: 0 8px 30px rgba(21,24,40,0.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, system-ui, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,#fafbff 0%, #f6f7fb 100%);
      color:#111827;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.7;
      padding:32px 16px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      max-width:var(--max-width);
      background:transparent;
    }

    /* 返回按钮 */
    .back-btn{
      position:fixed;
      left:20px;
      top:20px;
      z-index:60;
      background:rgba(255,255,255,0.9);
      border-radius:12px;
      padding:8px 10px;
      box-shadow: var(--shadow);
      display:flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:#111;
      font-weight:600;
    }
    .back-btn svg{width:18px;height:18px;display:block}

    /* 顶部大图（Hero） */
    .hero{
      position:relative;
      height:360px;
      border-radius:var(--radius);
      overflow:hidden;
      background-size:cover;
      background-position:center;
      box-shadow: var(--shadow);
    }
    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(5,6,10,0.12) 0%, rgba(5,6,10,0.04) 40%, rgba(255,255,255,0.15) 100%);
      pointer-events:none;
    }
    .hero-inner{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
    }
    .title{
      color:white;
      text-shadow: 0 6px 24px rgba(4,6,12,0.45);
      font-size:32px;
      font-weight:700;
      line-height:1.05;
      max-width:80%;
    }

    /* 卡片内容 */
    .card{
      margin-top:-48px; /* 悬浮在图片下方 */
      background:var(--card);
      border-radius:calc(var(--radius) - 6px);
      padding:28px;
      box-shadow: var(--shadow);
      position:relative;
      z-index:40;
    }
    .meta{
      display:flex;
      gap:12px;
      align-items:center;
      font-size:14px;
      color:var(--muted);
      margin-bottom:12px;
    }
    .avatar{
      width:44px;height:44px;border-radius:10px;overflow:hidden;
      background:linear-gradient(135deg,#eef2ff,#f3f4ff);
      display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);
    }
    .content{
      margin-top:6px;
      color:#111827;
      font-size:16px;
    }
    .content p{margin:0 0 16px}
    .content img{max-width:100%;border-radius:10px}

    .footer{
      margin-top:20px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      border-top:1px dashed #eef2ff;
      padding-top:14px;
      color:var(--muted);
      font-size:14px;
    }
    .links a{color:var(--accent); text-decoration:none; margin-right:10px; font-weight:600}

    /* 微信图标与二维码弹窗 */
    .wechat-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      user-select:none;
      border-radius:10px;
      padding:8px 12px;
      background:linear-gradient(90deg, rgba(99,102,241,0.08), rgba(99,102,241,0.03));
      border:1px solid rgba(99,102,241,0.08);
      color:var(--accent);
      font-weight:600;
    }
    .qr-modal{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:80;
      padding:24px;
    }
    .qr-modal.open{display:flex}
    .qr-card{
      background:var(--card);
      padding:18px;
      border-radius:12px;
      box-shadow: 0 20px 50px rgba(2,6,23,0.5);
      text-align:center;
      max-width:360px;
      width:100%;
    }
    .qr-card img{width:260px;height:260px;object-fit:contain;border-radius:8px}
    .qr-close{
      margin-top:12px;
      display:inline-block;
      font-size:13px;
      color:var(--muted);
      cursor:pointer;
    }

    /* 响应 */
    @media (max-width:640px){
      .hero{height:260px}
      .title{font-size:24px}
      .card{padding:18px}
      .avatar{width:40px;height:40px}
    }
  </style>
</head>
<body>

  <!-- 左上角返回按钮：修改 href="#" 为你要跳转的地址 -->
  <a class="back-btn" href="https://toby215.github.io/myblog/">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回
  </a>

  <main class="container" role="main">
    <section class="hero" id="hero" style="background-image: url('7aa5d81b477591b31c8340ec9d5231bd.png');">
      <div class="hero-inner">
        <h1 class="title" id="post-title">博客搭建大成功！</h1>
      </div>
    </section>

    <article class="card" aria-labelledby="post-title">
      <div class="meta">
        <div class="avatar" id="author-avatar">Y</div>
        <div>
          <div style="font-weight:700" id="author-name">文章作者：yangxt</div>
          <div style="font-size:13px;color:var(--muted)" id="post-date">2025-10-07</div>
        </div>
      </div>

      <div class="content" id="post-content">
      <p>博客搭建大成功</p>

      <div id="article-content">
        <h1>看遍了网上的教程，还是没搞定</h1>
        <h1>第二天下午想继续搞，但是遇上了一个奇怪的问题，又搞了很久</h1>
        <h1>最后通过咨询相关老师和朋友终于搞定啦，成功搭建！</h1>
        <h1>快乐，兴奋</h1>
        <h1>希望以后能多发文章到这里！！</h1>
      </div>

      <div class="footer">
        <div>
          <span style="font-weight:700" id="footer-author">版权声明: 本博客所有文章除特别声明外，均采用 CC BY-NC-SA 4.0 许可协议。转载请注明来自 效听的快乐日记！</span>
          <span style="margin-left:10px;color:var(--muted)" id="footer-copyright">© 2025</span>
        </div>



  <script>

</body>
</html>
